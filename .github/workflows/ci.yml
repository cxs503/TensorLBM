name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src tests examples
      - name: Type check (mypy)
        run: mypy src/tensorlbm --ignore-missing-imports
        continue-on-error: true
      - name: Run tests
        run: PYTHONPATH=src pytest -q --cov=tensorlbm
